<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Text Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📝 Real-Time Text Analyzer</h1>
        <p>Analyze text instantly with live statistics and letter frequency tracking.</p>
    </header>

    <div class="editor-section">

        <textarea
            id="textInput"
            placeholder="Start typing here..."
            rows="10"
        ></textarea>

        <div class="buttons">
            <button onclick="copyText()">📋 Copy</button>
            <button onclick="clearText()">🗑 Clear</button>
            <button onclick="toggleTheme()">🌙 Theme</button>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p id="warning" class="warning"></p>

    </div>

    <section class="stats">

        <div class="card">
            <h3>Words</h3>
            <p id="words">0</p>
        </div>

        <div class="card">
            <h3>Characters</h3>
            <p id="chars">0</p>
        </div>

        <div class="card">
            <h3>Spaces</h3>
            <p id="spaces">0</p>
        </div>
        
        <div class="card">
            <h3>Lines</h3>
            <p id="lines">0</p>
        </div>

        <div class="card">
            <h3>Reading Time</h3>
            <p id="readingTime">0 min</p>
        </div>

    </section>

    <section class="frequency-section">

        <h2>🔤 Letter Frequency (A-Z)</h2>

        <div class="table-wrapper">
            <table id="freqTable"></table>
        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
