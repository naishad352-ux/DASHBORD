<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Real-Time Text Analyzer</h1>

    <textarea
        id="textarea"
        placeholder="Start typing here..."
        rows="8"
    ></textarea>

    <button id="clearBtn">Clear Text</button>

    <div id="counter">
        <p>Characters: <span id="charCount">0</span></p>
        <p>Words: <span id="wordCount">0</span></p>
        <p>Lines: <span id="lineCount">0</span></p>
    </div>

    <h2>Letter Density (A-Z)</h2>

    <table>
        <thead>
            <tr>
                <th>Letter</th>
                <th>Count</th>
            </tr>
        </thead>

        <tbody id="densityTable"></tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
